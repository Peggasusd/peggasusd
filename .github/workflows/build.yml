name: Build PEGGASUSD APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build: debug o release'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_BREEZ_API_KEY: ${{ secrets.BREEZ_API_KEY }}

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Android app icons
        run: node scripts/generate-android-icons.js

      - name: Add camera permission to AndroidManifest
        run: |
          sed -i 's/<application/<uses-permission android:name="android.permission.CAMERA"\/>\n<uses-feature android:name="android.hardware.camera" android:required="false"\/>\n<application/' android/app/src/main/AndroidManifest.xml

      - name: Configure release signing
        if: inputs.build_type == 'release'
        run: node scripts/configure-release-signing.js
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        run: cd android && ./gradlew assemble${{ inputs.build_type == 'release' && 'Release' || 'Debug' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: peggasusd-apk-${{ inputs.build_type }}
          path: android/app/build/outputs/apk/${{ inputs.build_type }}/*.apk
